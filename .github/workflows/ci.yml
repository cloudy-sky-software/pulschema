on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  GO_VERSION: 1.26.x

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Unshallow clone for tags
        run: git fetch --prune --unshallow --tags

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@36fe29c8f9dc696b104db0f7d49d1a87d2bbcd5b
        with:
          # Use a commit hash from https://github.com/golangci/golangci-lint/commits/main.
          # Only supported when `install-mode` is `goinstall`.
          version: c592b80ac95af7adaeb67d75125d105ec7b33124
          install-mode: goinstall
          args: --config=.golangci.yml --timeout=10m

      - name: Test
        run: make test
